// --- Shared state via jsonblob ---
const BLOB_URL = 'https://jsonblob.com/api/jsonBlob/019d84d4-21a0-7fa3-92c2-44e7641c813a';
const states = {};

async function loadStates() {
  try {
    const resp = await fetch(BLOB_URL, { headers: { 'Accept': 'application/json' } });
    const data = await resp.json();
    Object.assign(states, data.states || {});
    renderMarkers();
  } catch(e) {
    try {
      const saved = JSON.parse(localStorage.getItem('fl-prop-states') || '{}');
      Object.assign(states, saved);
    } catch(e2) {}
    renderMarkers();
  }
}

async function saveStates() {
  localStorage.setItem('fl-prop-states', JSON.stringify(states));
  try {
    await fetch(BLOB_URL, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ states })
    });
  } catch(e) { console.error('Sync failed:', e); }
}

function getState(i) { return states[i] || 0; }
function toggleState(i, target) {
  states[i] = getState(i) === target ? 0 : target;
  saveStates();
  renderMarkers();
}
loadStates();

function calcEffective(price, concession) {
  if (!concession) return price;
  const c = concession.toLowerCase();
  let monthsFree = 0;
  const numMatch = c.match(/([\d.]+)/);
  if (!numMatch) return price;
  const num = parseFloat(numMatch[1]);
  if (c.includes('half month')) monthsFree = num * 0.5;
  else if (c.includes('week')) monthsFree = num / 4.33;
  else if (c.includes('month')) monthsFree = num;
  return Math.round(price * (12 - monthsFree) / 12);
}

DATA.forEach((d, i) => { d.effective = calcEffective(d.price, d.concession); d._i = i; });

// Populate area filter
const areas = [...new Set(DATA.map(d => d.area))].sort();
const areaSelect = document.getElementById('areaFilter');
areas.forEach(a => { const o = document.createElement('option'); o.value = a; o.textContent = a; areaSelect.appendChild(o); });

let showFavsOnly = false;
let hideDown = false;

document.getElementById('favFilter').addEventListener('click', () => {
  showFavsOnly = !showFavsOnly;
  document.getElementById('favFilter').classList.toggle('on-fav', showFavsOnly);
  renderMarkers();
});
document.getElementById('hideDownFilter').addEventListener('click', () => {
  hideDown = !hideDown;
  document.getElementById('hideDownFilter').classList.toggle('on-down', hideDown);
  renderMarkers();
});

// Dark map tiles
const map = L.map('map', { zoomControl: true }).setView([27.65, -82.55], 10);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; OpenStreetMap &copy; CARTO',
  maxZoom: 18

// Legend
const legend = L.control({ position: 'bottomright' });
legend.onAdd = function() {
  const div = L.DomUtil.create('div', 'legend');
  div.innerHTML = `
    <div class="legend-title">Price (2BR)</div>
    <i style="background:#34d399"></i> Under $1,900<br>
    <i style="background:#60a5fa"></i> $1,900 - $2,100<br>
    <i style="background:#fbbf24"></i> $2,100 - $2,300<br>
    <i style="background:#f87171"></i> Over $2,300
  `;
  return div;
};
legend.addTo(map);

function priceColor(p) {
  if (p < 1900) return '#34d399';
  if (p < 2100) return '#60a5fa';
  if (p < 2300) return '#fbbf24';
  return '#f87171';
}

function safetyClass(s) {
  return 'safety-' + s.toLowerCase().replace('-','-minus').replace('+','-plus');
}

let markers = [];

function renderMarkers() {
  markers.forEach(m => map.removeLayer(m));
  markers = [];

  const q = document.getElementById('search').value.toLowerCase();
  const area = document.getElementById('areaFilter').value;
  const conc = document.getElementById('concessionFilter').value;

  const filtered = DATA.filter(d => {
    if (q && ![d.name, d.area, d.nearest_beach, d.address].some(f => f.toLowerCase().includes(q))) return false;
    if (area && d.area !== area) return false;
    if (conc === 'has' && !d.concession) return false;
    if (conc === 'none' && d.concession) return false;
    if (showFavsOnly && getState(d._i) !== 1) return false;
    if (hideDown && getState(d._i) === 2) return false;
    return true;
  });

  filtered.forEach(d => {
    const s = getState(d._i);
    const color = s === 2 ? '#555' : priceColor(d.price);
    const opacity = s === 2 ? 0.3 : 0.85;
    const borderColor = s === 1 ? '#fbbf24' : '#fff';
    const borderWidth = s === 1 ? 3 : 2;

    const marker = L.circleMarker([d.lat, d.lng], {
      radius: s === 1 ? 12 : 10,
      fillColor: color,
      color: borderColor,
      weight: borderWidth,
      opacity: 0.9,
      fillOpacity: opacity
    }).addTo(map);

    const effectiveHtml = d.effective < d.price
      ? `<div class="popup-row"><span class="popup-label">Effective Rent</span><span class="popup-val green">$${d.effective.toLocaleString()}</span></div>`
      : '';

    const concessionHtml = d.concession
      ? `<div class="popup-row"><span class="popup-label">Concession</span><span class="concession-tag">${d.concession}</span></div>`
      : '';

    marker.bindPopup(`
      <div class="popup">
        <div class="popup-name">${d.name}</div>
        <div class="popup-area">${d.area} &middot; Built ${d.year}</div>
        <div class="popup-actions">
          <button class="popup-act-btn fav ${s===1?'on':''}" onclick="toggleState(${d._i},1)">★</button>
          <button class="popup-act-btn down ${s===2?'on':''}" onclick="toggleState(${d._i},2)"><svg viewBox="0 0 24 24" stroke-width="3" stroke="currentColor" fill="none" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
        </div>
        <div class="popup-row"><span class="popup-label">2BR Price</span><span class="popup-val green">$${d.price.toLocaleString()}</span></div>
        ${concessionHtml}
        ${effectiveHtml}
        <div class="popup-row"><span class="popup-label">Rating</span><span class="popup-val amber">${d.rating} ★</span></div>
        <div class="popup-row"><span class="popup-label">Walk Score</span><span class="popup-val blue">${d.walk}</span></div>
        <div class="popup-row"><span class="popup-label">Safety</span><span class="safety ${safetyClass(d.safety)}">${d.safety}</span></div>
        <div class="popup-row"><span class="popup-label">DT St. Pete</span><span class="popup-val">${d.dt_stpete} min</span></div>
        <div class="popup-row"><span class="popup-label">Nearest Beach</span><span class="popup-val">${d.nearest_beach} (${d.beach_drive})</span></div>
        <div class="popup-links">
          <a href="${d.website}" target="_blank">Website</a>
          <a href="${d.zillow}" target="_blank">Zillow</a>
        </div>
      </div>
    `, { maxWidth: 300 });

    markers.push(marker);
  });

  if (filtered.length) {
    const group = L.featureGroup(markers);
    map.fitBounds(group.getBounds().pad(0.1));
  }
}

document.getElementById('search').addEventListener('input', renderMarkers);
document.getElementById('areaFilter').addEventListener('change', renderMarkers);
document.getElementById('concessionFilter').addEventListener('change', renderMarkers);

renderMarkers();

// --- POI Layer ---
const poiLayers = { tj: [], wf: [], pilates: [], coffee: [] };
const poiVisible = { tj: true, wf: true, pilates: true, coffee: true };

const poiStyles = {
  tj:      { color: '#f9a8d4' },
  wf:      { color: '#c4a882' },
  pilates: { color: 'rgba(255,255,255,0.5)' },
  coffee:  { color: 'rgba(255,255,255,0.5)' }
};

const chainCoffee = ['starbucks','dunkin','mcdonald','tim horton','panera','caribou','peet','wawa','7-eleven','circle k','racetrac','speedway','gas','shell','bp','chevron'];

function makePOIIcon(cat) {
  const s = poiStyles[cat];
  return L.divIcon({
    className: '',
    html: `<div style="width:10px;height:10px;border-radius:50%;background:${s.color};border:1px solid ${s.color};opacity:0.8"></div>`,
    iconSize: [10, 10],
    iconAnchor: [5, 5]
  });
}

function togglePOI(cat) {
  poiVisible[cat] = !poiVisible[cat];
  document.querySelector(`.poi-toggle[data-cat="${cat}"]`).classList.toggle('on', poiVisible[cat]);
  updatePOIVisibility();
}

function updatePOIVisibility() {
  const zoom = map.getZoom();
  Object.keys(poiLayers).forEach(cat => {
    poiLayers[cat].forEach(m => {
      if (poiVisible[cat] && zoom >= 12) m.addTo(map);
      else map.removeLayer(m);
    });
  });
}

map.on('zoomend', updatePOIVisibility);

function addPOIMarker(cat, lat, lng, name) {
  const m = L.marker([lat, lng], { icon: makePOIIcon(cat), zIndexOffset: -100 });
  const catLabel = {tj:"Trader Joe's",wf:"Whole Foods",pilates:"Pilates Studio",coffee:"Coffee Shop"}[cat];
  m.bindPopup(`<div class="poi-popup"><div class="poi-popup-name">${name}</div><div class="poi-popup-cat">${catLabel}</div></div>`, { maxWidth: 220 });
  poiLayers[cat].push(m);
}

// Bounding box: covers all properties with padding
const bbox = '27.35,-82.85,27.95,-82.35';

async function loadPOIs() {
  const endpoints = [
    'https://overpass.kumi.systems/api/interpreter',
    'https://overpass-api.de/api/interpreter'
  ];

  const query = `[out:json][timeout:30];
(
  node["brand"~"Trader Joe|Whole Foods"](${bbox});
  way["brand"~"Trader Joe|Whole Foods"](${bbox});
  node["leisure"="fitness_centre"]["name"~"[Pp]ilates|[Bb]arre|[Rr]eformer"](${bbox});
  node["sport"="pilates"](${bbox});
  node["amenity"="cafe"](${bbox});
  way["amenity"="cafe"](${bbox});
);
out center;`;

  let data;
  for (const endpoint of endpoints) {
    try {
      const resp = await fetch(endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: 'data=' + encodeURIComponent(query)
      });
      if (!resp.ok) continue;
      data = await resp.json();
      if (data.elements) break;
    } catch(e) { continue; }
  }

  try {
    if (!data || !data.elements) throw new Error('All servers failed');

    data.elements.forEach(el => {
      const lat = el.lat || (el.center && el.center.lat);
      const lng = el.lon || (el.center && el.center.lon);
      if (!lat || !lng) return;

      const tags = el.tags || {};
      const name = tags.name || tags.brand || 'Unknown';
      const brand = (tags.brand || '').toLowerCase();

      if (brand.includes('trader joe')) {
        addPOIMarker('tj', lat, lng, name);
      } else if (brand.includes('whole foods')) {
        addPOIMarker('wf', lat, lng, name);
      } else if (tags.leisure === 'fitness_centre' || tags.sport === 'pilates') {
        addPOIMarker('pilates', lat, lng, name);
      } else if (tags.amenity === 'cafe') {
        const nl = name.toLowerCase();
        if (chainCoffee.some(c => nl.includes(c))) return;
        addPOIMarker('coffee', lat, lng, name);
      }
    });

    document.getElementById('poiLoading').textContent =
      `${poiLayers.tj.length} TJ · ${poiLayers.wf.length} WF · ${poiLayers.pilates.length} pilates · ${poiLayers.coffee.length} coffee`;
    updatePOIVisibility();
    setTimeout(() => { document.getElementById('poiLoading').style.opacity = '0'; }, 3000);
  } catch(e) {
    document.getElementById('poiLoading').textContent = 'POI load failed';
    console.error('Overpass error:', e);
  }
}

loadPOIs();
</script>
